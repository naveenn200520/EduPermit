version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=tjs-engineering-college-secret-key-2024
      - DATABASE_URL=sqlite:///college.db
    volumes:
      - ./static:/app/static
      - ./instance:/app/instance
    restart: unless-stopped
    depends_on:
      - db

  db:
    image: postgres:13
    environment:
      - POSTGRES_DB=college_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=tjscollege123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  postgres_data:
